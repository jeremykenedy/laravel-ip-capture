<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <rect width="800" height="200" rx="16" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Network/IP illustration (right side) -->
  <g transform="translate(570, 40)">
    <!-- Central globe/network circle -->
    <circle cx="60" cy="60" r="45" fill="none" stroke="#c4b5fd" stroke-width="2" opacity=".6"/>
    <circle cx="60" cy="60" r="30" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity=".5"/>
    <!-- Latitude lines -->
    <ellipse cx="60" cy="60" rx="45" ry="15" fill="none" stroke="#c4b5fd" stroke-width="1" opacity=".4"/>
    <ellipse cx="60" cy="60" rx="45" ry="35" fill="none" stroke="#c4b5fd" stroke-width="1" opacity=".3"/>
    <!-- Longitude line -->
    <ellipse cx="60" cy="60" rx="15" ry="45" fill="none" stroke="#c4b5fd" stroke-width="1" opacity=".4"/>
    <!-- Network nodes -->
    <circle cx="25" cy="40" r="5" fill="#8b5cf6" opacity=".8"/>
    <circle cx="95" cy="45" r="5" fill="#3b82f6" opacity=".8"/>
    <circle cx="60" cy="15" r="5" fill="#22c55e" opacity=".8"/>
    <circle cx="40" cy="90" r="5" fill="#f59e0b" opacity=".8"/>
    <circle cx="85" cy="85" r="5" fill="#ef4444" opacity=".8"/>
    <circle cx="60" cy="60" r="6" fill="#6d28d9"/>
    <!-- Connection lines -->
    <line x1="60" y1="60" x2="25" y2="40" stroke="#8b5cf6" stroke-width="1" opacity=".4"/>
    <line x1="60" y1="60" x2="95" y2="45" stroke="#3b82f6" stroke-width="1" opacity=".4"/>
    <line x1="60" y1="60" x2="60" y2="15" stroke="#22c55e" stroke-width="1" opacity=".4"/>
    <line x1="60" y1="60" x2="40" y2="90" stroke="#f59e0b" stroke-width="1" opacity=".4"/>
    <line x1="60" y1="60" x2="85" y2="85" stroke="#ef4444" stroke-width="1" opacity=".4"/>
    <!-- Location pin -->
    <g transform="translate(48, -5)">
      <path d="M12 0C7 0 3 4 3 9c0 7 9 15 9 15s9-8 9-15c0-5-4-9-9-9z" fill="#6d28d9" opacity=".9"/>
      <circle cx="12" cy="9" r="3.5" fill="#fff"/>
    </g>
  </g>

  <!-- Title -->
  <text x="50" y="80" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="40" font-weight="700" letter-spacing="-.5" fill="#0f172a">Laravel IP Capture</text>

  <!-- Tagline -->
  <text x="50" y="110" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">Automatically capture and track IP addresses on Eloquent model actions</text>

  <!-- Feature pills -->
  <g transform="translate(50, 128)">
    <!-- Auto-Capture -->
    <rect x="0" y="0" width="88" height="22" rx="11" fill="#f5f3ff" stroke="#8b5cf6" stroke-width=".8"/>
    <text x="44" y="14.5" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="#6d28d9" text-anchor="middle">Auto-Capture</text>

    <!-- Proxy-Aware -->
    <rect x="96" y="0" width="84" height="22" rx="11" fill="#eff6ff" stroke="#3b82f6" stroke-width=".8"/>
    <text x="138" y="14.5" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="#1e40af" text-anchor="middle">Proxy-Aware</text>

    <!-- Hash Support -->
    <rect x="188" y="0" width="86" height="22" rx="11" fill="#f0fdf4" stroke="#22c55e" stroke-width=".8"/>
    <text x="231" y="14.5" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="#166534" text-anchor="middle">Hash Support</text>

    <!-- Configurable -->
    <rect x="282" y="0" width="82" height="22" rx="11" fill="#fffbeb" stroke="#f59e0b" stroke-width=".8"/>
    <text x="323" y="14.5" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="#b45309" text-anchor="middle">Configurable</text>

    <!-- Trait-Based -->
    <rect x="372" y="0" width="78" height="22" rx="11" fill="#fef2f2" stroke="#ef4444" stroke-width=".8"/>
    <text x="411" y="14.5" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="#b91c1c" text-anchor="middle">Trait-Based</text>
  </g>
</svg>
